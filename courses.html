<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLearn — Active Workspace</title>
    <link rel="stylesheet" href="./src/scss/main.scss">
</head>
<body class="workspace-body">

    <header class="site-header">
        <div class="header-container">
            <div class="logo">
                <span class="logo-icon">💡</span>
            </div>
            <div class="nav-search-wrapper">
                <input type="search" id="catalogSearch" placeholder="Search tracks (e.g., Logic, Math, Physics)..." autocomplete="off">
                <span class="search-icon">🔍</span>
            </div>
            <a href="/dashboard.html" class="btn-pill btn-primary">Dashboard</a>
        </div>
    </header>

    <main class="catalog-container">
        <div class="catalog-header">
            <h2>Explore Active Tracks</h2>
            <p id="resultCount" style="color: grey; font-size: 0.9rem; margin-top: 4px;">Loading dynamic arrays...</p>
        </div>

        <div class="courses-grid" id="coursesGrid"></div>
    </main>

    <div id="netlify-auth-root"></div>

    <script type="module" src="./src/js/app.js"></script>
    <script type="module" src="./src/js/courses.js"></script>
</body>
</html>
