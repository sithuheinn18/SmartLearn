<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLearn — Active Workspace</title>
    <link rel="stylesheet" href="/test.b10d73a7.css">
</head>
<body class="workspace-body">
    <div class="loading" id="loading">
        <span class="loading-circle"></span>
    </div>

    <header class="site-header">
        <div class="header-container">
            <div class="logo">
                <span class="logo-icon">💡</span>
            </div>
            <div class="nav-search-wrapper">
                <input type="search" id="catalogSearch" placeholder="Search tracks (e.g., Logic, Math, Physics)..." autocomplete="off">
                <span class="search-icon">🔍</span>
            </div>
            <a href="/dashboard.html" class="btn-pill btn-primary">Dashboard</a>
        </div>
    </header>

    <main class="catalog-container">
        <div class="catalog-header">
            <h2 class="animate-on-scroll">Explore Active Tracks</h2>
            <p class="animate-on-scroll" id="resultCount" style="color: gray; margin-top: 4px; font-size: .9rem; transition-delay: .15s">Loading dynamic arrays...</p>
        </div>

        <div class="courses-grid animate-on-scroll" id="coursesGrid" style="transition-delay: .3s"></div>
    </main>

    <div id="netlify-auth-root"></div>

    <script type="module" src="/test.3052eed7.js"></script>
    <script type="module" src="/courses.9aacd79f.js"></script>

</body></html>
