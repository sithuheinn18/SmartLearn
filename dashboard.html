<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLearn — Student Command Center</title>
    <link rel="stylesheet" href="./src/scss/main.scss">
    <script type="text/javascript" src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="dashboard-body">

    <header class="site-header">
        <div class="header-container">
            <div class="logo">
                <span class="logo-icon">💡</span><p><a href="#" class="action">SmartLearn</a></p>
            </div>

            <a href="courses.html" class="btn-pill btn-primary">Courses</a>
            <!-- <div id="authButtonSlot"></div> -->
        </div>
    </header>

    <main class="dashboard-layout-grid">
        <aside class="dashboard-sidebar">
            <div class="profile-card" id="userProfileCard">
                <div class="avatar-placeholder">👤</div>
                <h3 id="profileName">Loading Student...</h3>
                <p id="profileEmail">...</p>
            </div>
            
            <div class="stats-card">
                <h4>Track Metrics</h4>
                <div class="stat-row"><span>Completed Tracks</span><strong id="statCompleted">0</strong></div>
                <div class="stat-row"><span>XP Earned</span><strong id="statXP">0 XP</strong></div>
            </div>
        </aside>

        <section class="dashboard-content">
            <h2>Your Active Learning Tracks</h2>
            <div class="enrollment-list" id="enrollmentListContainer">
                <div class="grid-message">Synchronizing your user profile tracking matrices...</div>
            </div>
        </section>
    </main>

    <script type="module" src="./src/js/app.js"></script>
    <script type="module" src="./src/js/dashboard.js"></script>
</body>
</html>
